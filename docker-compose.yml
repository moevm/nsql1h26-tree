services:
  db:
    image: neo4j:5.18-community
    container_name: tree_db 
    environment:
      - NEO4J_AUTH=${NEO4J_USER}/${NEO4J_PASSWORD}
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs 
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  backend:
    build:
      context: ./project/backend
      dockerfile: Dockerfile
    container_name: tree_backend
    env_file:
      - .env 
    ports: 
      - "127.0.0.1:8000:8000"
    depends_on:
      db:
        condition: service_healthy 

  frontend:
    build:
      context: ./project/frontend
      dockerfile: Dockerfile
    container_name: tree_frontend
    env_file:
      - ./project/frontend/.env
    ports:
      - "127.0.0.1:5173:5173"
    depends_on:
      - backend

volumes:
  neo4j_data:
  neo4j_logs:
